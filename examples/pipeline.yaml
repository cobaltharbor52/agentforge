# Example ContentForge pipeline configuration
mimo:
  base_url: https://token-plan-sgp.xiaomimimo.com/v1
  model: mimo-v2.5-pro
  max_tokens: 4096
  temperature: 0.7
  max_retries: 3

pipeline:
  target_word_count: 2000
  language: en
  output_format: markdown
  seo_enabled: true
  quality_threshold: 0.8
  max_iterations: 3
  enable_translation: false
  target_languages:
    - zh
    - ms
  publish_targets:
    - markdown
    - html

agents:
  - name: writer
    temperature_override: 0.8
    max_tokens_override: 8192
  - name: editor
    temperature_override: 0.6
  - name: quality
    temperature_override: 0.3

log_level: INFO
output_dir: ./output
cache_dir: ./cache
